apiVersion: ar.dev/v1alpha1
kind: Agent
metadata:
  name: joshpritchardagentdemo
  version: "0.1.0"
spec:
  # Set this to a registry path you can push to, e.g.
  #   ghcr.io/<your-github-user>/agentdemo:0.1.0
  image: us-docker.pkg.dev/developers-369321/agentregistry-enterprise-public-nonprod/josh-pritchard/agentdemo:0.1.0
  language: python
  framework: adk
  # Model auth is handled by the in-repo bedrock_model.py adapter using boto3
  # credentials — the SSO session locally, the workload identity on AgentCore.
  # No API keys.
  modelProvider: bedrock
  modelName: us.anthropic.claude-sonnet-4-5-20250929-v1:0
  description: Dice-rolling sample ADK-Python agent.
  telemetryEndpoint: http://k8s-arejoshp-agentreg-a75744b1b4-5a1e9ea8c3b9350a.elb.us-east-1.amazonaws.com:4318
  mcpServers: []
